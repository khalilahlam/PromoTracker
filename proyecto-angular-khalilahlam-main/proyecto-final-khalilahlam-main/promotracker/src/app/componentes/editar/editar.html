<div class="container form-wrapper">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-7">

      <div class="form-card">

        <div class="form-header text-center mb-4">
          <h2 class="form-title">Editar Promoción</h2>
          <p class="form-subtitle">Modifica los datos de la promoción</p>
        </div>

        <form (ngSubmit)="guardarCambios()" #formPromocion="ngForm">

          <div class="row g-4">

            <div class="col-12">
              <label class="form-label">Nombre</label>
              <input type="text"
                     class="form-control"
                     name="title"
                     [(ngModel)]="promocion.title"
                     required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Fecha</label>
              <input type="date"
                     class="form-control"
                     name="date"
                     [(ngModel)]="promocion.date"
                     required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Precio</label>
              <input type="number"
                     class="form-control"
                     name="price"
                     [(ngModel)]="promocion.price"
                     required>
            </div>

            <div class="col-12">
              <label class="form-label">Descripción</label>
              <textarea class="form-control"
                        rows="3"
                        name="description"
                        [(ngModel)]="promocion.description"
                        required>
              </textarea>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Categoría</label>
              <select class="form-select"
                      name="categoria"
                      [(ngModel)]="promocion.categoria"
                      required>
                <option value="calzado">Calzado</option>
                <option value="ropa-superior">Ropa Superior</option>
                <option value="ropa-inferior">Ropa Inferior</option>
                <option value="accesorios">Accesorios</option>
                <option value="general">Ofertas Generales</option>
              </select>
            </div>

            <div class="col-12 col-md-6 d-flex align-items-end">
              <div class="form-check form-switch">
                <input class="form-check-input"
                       type="checkbox"
                       name="activa"
                       [(ngModel)]="promocion.activa"
                       id="activa">
                <label class="form-check-label ms-2" for="activa">
                  Promoción activa
                </label>
              </div>
            </div>

            <div class="col-12 mt-3">
              <button type="submit"
                      class="btn btn-primary w-100"
                      [disabled]="formPromocion.invalid">
                Guardar Cambios
              </button>
            </div>

          </div>
        </form>

      </div>

    </div>
  </div>
</div>
