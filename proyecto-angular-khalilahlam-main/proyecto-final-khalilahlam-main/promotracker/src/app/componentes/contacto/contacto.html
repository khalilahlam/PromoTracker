<div class="hero-section-contacto">
  <div class="container py-5">
    <div class="row align-items-center justify-content-center">

      <div class="col-lg-6 mb-5 mb-lg-0">
        <div class="contact-card">
          <h1 class="display-4 fw-bold text-center mb-3 gradient-text">Contacto</h1>
          <p class="lead text-center mb-4">
            ¿Tienes dudas o problemas en la web? Rellena el formulario y te responderé.
          </p>

          <form action="https://formspree.io/f/mvzbbdnb" method="POST">
            <div class="mb-3">
              <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="mb-3">
              <input type="email" name="_replyto" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
              <textarea name="mensaje" class="form-control" rows="4" placeholder="Mensaje" required></textarea>
            </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold">
                  Enviar
                </button>
                    </form>
        </div>
      </div>

      <div class="col-lg-4 text-center">
        <div class="contact-image">
          <img src="assets/images/mi-foto.png" alt="Foto de contacto" class="img-fluid rounded-circle shadow">
        </div>
      </div>

    </div>
  </div>
</div>
